  <style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #0b0d0a; }
  #stage { position: fixed; inset: 0; display: block; width: 100vw; height: 100vh; z-index: 0; cursor: none; }
  #floor { position: fixed; left: 0; right: 0; bottom: 0; height: 14%; z-index: 1; pointer-events: none; background: linear-gradient(to bottom, rgba(4,7,3,0) 0%, rgba(4,7,3,0.10) 60%, rgba(3,6,2,0.26) 100%); }
  #bug { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: 2; pointer-events: none; }
  #hint { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; transition: opacity .6s ease; z-index: 3; }
  #hint .pill { font: 400 15px/1.4 ui-sans-serif, system-ui, -apple-system, sans-serif; color: rgba(255,255,255,.92); background: rgba(20,30,20,.42); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,.16); border-radius: 18px; padding: 16px 22px; text-align: center; max-width: 80vw; }
  #hint .pill small { display: block; margin-top: 6px; font-size: 12.5px; color: rgba(255,255,255,.6); font-style: italic; }
  body.has-photo #hint, body.started #hint { opacity: 0; }
  body.dragging #stage { filter: brightness(1.12); }
  #dn { position: fixed; top: 18px; right: 18px; z-index: 5; cursor: pointer; width: 42px; height: 42px; border-radius: 50%; display: grid; place-items: center; background: rgba(20,30,24,.40); border: 1px solid rgba(255,255,255,.16); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); color: rgba(255,255,255,.82); transition: background .3s; }
  #dn:hover { background: rgba(30,42,34,.55); }
  #dn svg { width: 20px; height: 20px; }
  #dn .moon { display: none; }
  body.night #dn .sun { display: none; }
  body.night #dn .moon { display: inline; }
  #snd { position: fixed; top: 18px; right: 68px; z-index: 5; cursor: pointer; width: 42px; height: 42px; border-radius: 50%; display: grid; place-items: center; background: rgba(20,30,24,.40); border: 1px solid rgba(255,255,255,.16); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); color: rgba(255,255,255,.82); transition: background .3s; }
  #snd:hover { background: rgba(30,42,34,.55); }
  #snd svg { width: 20px; height: 20px; }
  #snd .off { display: none; }
  body.muted #snd .on { display: none; }
  body.muted #snd .off { display: inline; }
  #breath { position: fixed; top: 18px; right: 118px; z-index: 5; cursor: pointer; width: 42px; height: 42px; border-radius: 50%; display: grid; place-items: center; background: rgba(20,30,24,.40); border: 1px solid rgba(255,255,255,.16); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); color: rgba(255,255,255,.82); transition: background .3s, color .3s, border-color .3s; }
  #breath:hover { background: rgba(30,42,34,.55); }
  #breath svg { width: 20px; height: 20px; }
  body.mic-on #breath { color: #b9e6a0; border-color: rgba(185,230,160,.6); background: rgba(40,60,40,.5); }
  #toast { position: fixed; top: 70px; right: 18px; z-index: 6; max-width: 280px; padding: 10px 14px; border-radius: 14px; background: rgba(18,26,18,.62); border: 1px solid rgba(255,255,255,.16); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); color: rgba(255,255,255,.86); font: 400 12px/1.4 ui-sans-serif, system-ui, sans-serif; opacity: 0; transform: translateY(-6px); transition: opacity .4s ease, transform .4s ease; pointer-events: none; }
  #toast.show { opacity: 1; transform: none; }
  #cam { position: fixed; width: 2px; height: 2px; bottom: 0; left: 0; opacity: 0.01; pointer-events: none; }
  #panel { position: fixed; left: 18px; bottom: 18px; z-index: 4; cursor: auto; display: flex; flex-direction: column; gap: 12px; padding: 16px 18px; min-width: 220px; background: rgba(18,26,18,.40); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,.14); border-radius: 20px; font: 400 12px/1.3 ui-sans-serif, system-ui, -apple-system, sans-serif; color: rgba(255,255,255,.85); opacity: .35; transition: opacity .3s ease; user-select: none; }
  #panel:hover { opacity: 1; }
  #panel .row { display: grid; grid-template-columns: 64px 1fr 34px; align-items: center; gap: 10px; }
  #panel label { color: rgba(255,255,255,.7); }
  #panel output { text-align: right; font-variant-numeric: tabular-nums; color: rgba(255,255,255,.55); }
  #panel input[type=range] { -webkit-appearance: none; appearance: none; height: 3px; border-radius: 3px; background: rgba(255,255,255,.22); outline: none; cursor: pointer; }
  #panel input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%; background: #b9e6a0; cursor: pointer; border: none; }
  #panel input[type=range]::-moz-range-thumb { width: 13px; height: 13px; border-radius: 50%; background: #b9e6a0; cursor: pointer; border: none; }
  #panel .title { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,.45); margin-bottom: 2px; }
</style>
</head>
<body>
  <canvas id="stage"></canvas>
  <div id="floor"></div>
  <canvas id="bug"></canvas>
  <button id="breath" aria-label="breathe into the meadow" title="breathe into the meadow — uses your camera, processed locally, never recorded">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8h9a3 3 0 1 0-3-3"/><path d="M3 12h13a3 3 0 1 1-3 3"/><path d="M3 16h7"/></svg>
  </button>
  <button id="snd" aria-label="toggle sound" title="sound (mute)">
    <svg class="on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/></svg>
    <svg class="off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M22 9l-6 6M16 9l6 6"/></svg>
  </button>
  <button id="dn" aria-label="toggle day and night" title="day / night (N)">
    <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    <svg class="moon" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
  </button>
  <div id="hint"><div class="pill">drop in a photo of a field to begin<small>or just explore · move to guide the butterfly · press N for night · tap the breath icon to blow</small></div></div>
  <div id="panel">
    <div class="title">meadow</div>
    <div class="row"><label>wind</label><input id="wind" type="range" min="0" max="2" step="0.01" value="1"><output id="wind_v"></output></div>
    <div class="row"><label>reach</label><input id="reach" type="range" min="0.02" max="0.4" step="0.005" value="0.14"><output id="reach_v"></output></div>
    <div class="row"><label>force</label><input id="force" type="range" min="0" max="2.5" step="0.01" value="1.2"><output id="force_v"></output></div>
    <div class="row"><label>recovery</label><input id="recovery" type="range" min="0.80" max="0.98" step="0.005" value="0.90"><output id="recovery_v"></output></div>
  </div>
  <div id="toast"></div>
  <video id="cam" playsinline muted></video>
<script>
(() => {
  "use strict";
  const canvas = document.getElementById("stage");
  const gl = canvas.getContext("webgl2", { antialias: true, premultipliedAlpha: false });
  if (!gl) { document.body.innerHTML = "<p style='color:#fff;padding:2rem;font-family:sans-serif'>WebGL2 not supported.</p>"; return; }

  const compile = (type, src) => { const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s); if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s) + "\n" + src); return s; };
  const program = (vs, fs) => { const p = gl.createProgram(); gl.attachShader(p, compile(gl.VERTEX_SHADER, vs)); gl.attachShader(p, compile(gl.FRAGMENT_SHADER, fs)); gl.linkProgram(p); if (!gl.getProgramParameter(p, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p)); return p; };

  const COVER = `
  vec2 coverUV(vec2 uv, float scr, float img){
    vec2 c = uv - 0.5;
    if (scr > img) c.y *= img/scr; else c.x *= scr/img;
    return c + 0.5;
  }`;

  const QUAD_VS = `#version 300 es
  layout(location=0) in vec2 a_pos; out vec2 v_uv;
  void main(){ v_uv = a_pos*0.5+0.5; gl_Position = vec4(a_pos,0.,1.); }`;

  const SIM_FS = `#version 300 es
  precision highp float;
  in vec2 v_uv; out vec4 o;
  uniform sampler2D u_prev;
  uniform vec2 u_mouse, u_mousePrev, u_blowPos;
  uniform float u_aspect, u_radius, u_strength, u_decay, u_active, u_blow, u_blowRadius;
  void main(){
    vec2 off = (texture(u_prev, v_uv).rg - 0.5) * 2.0;
    off *= u_decay;
    vec2 d = v_uv - u_mouse; d.x *= u_aspect;
    float dist = length(d);
    float infl = smoothstep(u_radius, 0.0, dist);
    vec2 dir = dist > 1e-4 ? normalize(v_uv - u_mouse) : vec2(0.0);
    vec2 vel = clamp(u_mouse - u_mousePrev, -0.06, 0.06);
    off += (dir * 0.55 + vel * 14.0) * infl * u_strength * u_active;
    // breath: a radial parting that opens where you blow (grass pushed outward)
    vec2 bd = v_uv - u_blowPos; bd.x *= u_aspect;
    float bdist = length(bd);
    float binfl = smoothstep(u_blowRadius, 0.0, bdist);
    vec2 bdir = bdist > 1e-4 ? normalize(v_uv - u_blowPos) : vec2(0.0);
    float fgw = 1.0 - smoothstep(0.0, 0.72, v_uv.y);
    off += bdir * u_blow * binfl * (0.55 + 0.45*fgw);
    off = clamp(off, -1.0, 1.0);
    o = vec4(off*0.5+0.5, 0.0, 1.0);
  }`;

  // ---- background photo, with night grade + firefly ground-pool ----
  const BG_FS = `#version 300 es
  precision highp float;
  in vec2 v_uv; out vec4 o;
  uniform sampler2D u_image;
  uniform float u_scrAspect, u_imgAspect, u_night, u_glow;
  uniform vec2 u_fire;
  ${COVER}
  void main(){
    vec3 col = texture(u_image, coverUV(v_uv, u_scrAspect, u_imgAspect)).rgb;
    float lum = dot(col, vec3(0.3,0.59,0.11));
    vec3 night = mix(col, vec3(lum), 0.35) * vec3(0.169,0.218,0.363); // dark, cool, desaturated
    vec3 base = mix(col, night, u_night);
    // warm pool of firefly light on the ground
    vec2 d = v_uv - u_fire; d.x *= u_scrAspect;
    float r = 0.137;
    float pool = exp(-dot(d,d)/(2.0*r*r));
    base += vec3(1.0,0.72,0.34) * pool * u_night * u_glow * 0.85;
    o = vec4(base, 1.0);
  }`;

  // ---- grass blades ----
  const BLADE_VS = `#version 300 es
  precision highp float;
  layout(location=0) in vec2 a_geo;
  layout(location=1) in vec2 a_base;
  layout(location=2) in vec2 a_size;
  layout(location=3) in float a_phase;
  layout(location=4) in float a_lean;
  layout(location=5) in float a_jit;
  uniform vec2 u_res; uniform float u_time, u_wind, u_push, u_dpr;
  uniform float u_scrAspect, u_imgAspect;
  uniform sampler2D u_field, u_image;
  out float v_t, v_side; out vec3 v_color; out vec2 v_base;
  ${COVER}
  void main(){
    float t = a_geo.y, side = a_geo.x;
    vec2 sz = a_size * u_dpr;
    vec2 base = a_base * u_res;
    float w1 = sin(u_time*1.1 + a_phase*6.2831 + a_base.x*5.0);
    float w2 = sin(u_time*2.3 + a_phase*3.1);
    float sway = (w1*0.7 + w2*0.3 + a_lean*0.6);
    float bendX = sway * u_wind * sz.y * 0.16 * (t*t);
    vec2 f = (texture(u_field, a_base).rg - 0.5) * 2.0;
    float fl = length(f);
    bendX += f.x * u_push * u_dpr * t;
    float bendY = -fl * u_push * u_dpr * 0.4 * t;
    float halfW = side * sz.x * 0.5 * (1.0 - 0.82*t);
    vec2 p = base;
    p.x += halfW + bendX;
    p.y += t * sz.y + bendY;
    gl_Position = vec4((p / u_res) * 2.0 - 1.0, 0.0, 1.0);
    v_t = t; v_side = side; v_base = a_base;
    vec3 c = texture(u_image, coverUV(a_base, u_scrAspect, u_imgAspect)).rgb;
    v_color = c * (0.88 + a_jit*0.28);
  }`;

  const BLADE_FS = `#version 300 es
  precision highp float;
  in float v_t, v_side; in vec3 v_color; in vec2 v_base; out vec4 o;
  uniform float u_night, u_aspect, u_glow;
  uniform vec2 u_fire;
  void main(){
    float edge = 1.0 - smoothstep(0.4, 1.0, abs(v_side));
    float tip  = smoothstep(1.0, 0.72, v_t);
    float a = edge * tip;
    if (a < 0.02) discard;
    float shade = mix(0.6, 1.18, v_t);
    vec3 col = v_color * shade;
    // fall dark & cool at night
    vec3 night = col * vec3(0.145,0.194,0.327);
    col = mix(col, night, u_night);
    // firefly warm light — nearer blades and tips catch more
    vec2 d = v_base - u_fire; d.x *= u_aspect;
    float lr = 0.101;
    float L = exp(-dot(d,d)/(2.0*lr*lr));
    col += vec3(1.0,0.70,0.28) * L * u_night * u_glow * (0.35 + 0.65*v_t) * 1.7;
    o = vec4(col, a);
  }`;

  const progSim = program(QUAD_VS, SIM_FS);
  const progBg  = program(QUAD_VS, BG_FS);
  const progBl  = program(BLADE_VS, BLADE_FS);

  const vaoQuad = gl.createVertexArray(); gl.bindVertexArray(vaoQuad);
  const quadBuf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  gl.enableVertexAttribArray(0); gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

  const SEG = 6, N = 12000;
  const geo = [];
  for (let k = 0; k <= SEG; k++){ geo.push(-1, k/SEG, 1, k/SEG); }
  const VERTS = (SEG + 1) * 2;
  const inst = [];
  for (let i = 0; i < N; i++){
    const x = Math.random();
    let y = Math.pow(Math.random(), 1.7) * 0.58;
    const hfac = Math.max(0, 1 - y / 0.58);
    const h = (26 + 122 * hfac) * (0.7 + 0.6 * Math.random());
    // sink the lowest roots a touch below the frame so the baseline is a ragged fringe, not a flat seam
    if (y < 0.06) y -= Math.random() * 0.09;
    const w = 2.2 + 2.0 * Math.random();
    inst.push({ x, y, w, h, phase: Math.random(), lean: Math.random()*2-1, jit: Math.random() });
  }
  inst.sort((a, b) => b.y - a.y);
  const instData = new Float32Array(N * 7);
  inst.forEach((b, i) => { const o = i*7; instData[o]=b.x; instData[o+1]=b.y; instData[o+2]=b.w; instData[o+3]=b.h; instData[o+4]=b.phase; instData[o+5]=b.lean; instData[o+6]=b.jit; });

  const vaoBl = gl.createVertexArray(); gl.bindVertexArray(vaoBl);
  const geoBuf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, geoBuf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(geo), gl.STATIC_DRAW);
  gl.enableVertexAttribArray(0); gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
  const instBuf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, instBuf);
  gl.bufferData(gl.ARRAY_BUFFER, instData, gl.STATIC_DRAW);
  const S = 7*4;
  const setI = (loc, size, off) => { gl.enableVertexAttribArray(loc); gl.vertexAttribPointer(loc, size, gl.FLOAT, false, S, off); gl.vertexAttribDivisor(loc, 1); };
  setI(1, 2, 0); setI(2, 2, 8); setI(3, 1, 16); setI(4, 1, 20); setI(5, 1, 24);
  gl.bindVertexArray(null);

  const mkTex = (w, h) => { const t = gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D, t); gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,w,h,0,gl.RGBA,gl.UNSIGNED_BYTE,null); gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR); gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR); gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE); gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE); return t; };
  let fieldW=1, fieldH=1, fboA, fboB, texA, texB;
  function makeTargets(w, h){
    fieldW=w; fieldH=h;
    [texA,texB].forEach(t=>t&&gl.deleteTexture(t)); [fboA,fboB].forEach(f=>f&&gl.deleteFramebuffer(f));
    texA=mkTex(w,h); texB=mkTex(w,h); fboA=gl.createFramebuffer(); fboB=gl.createFramebuffer();
    for (const [fbo,tex] of [[fboA,texA],[fboB,texB]]){ gl.bindFramebuffer(gl.FRAMEBUFFER,fbo); gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,tex,0); gl.clearColor(0.5,0.5,0.,1.); gl.clear(gl.COLOR_BUFFER_BIT); }
    gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  }

  let imgAspect = 1.5;
  const imageTex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, imageTex);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR); gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE); gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  const upload = (src, aspect) => { gl.bindTexture(gl.TEXTURE_2D, imageTex); gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true); gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,src); imgAspect = aspect; };
  function placeholder(){
    const c = document.createElement("canvas"); c.width=1280; c.height=854; const x=c.getContext("2d");
    const g = x.createLinearGradient(0,0,0,854); g.addColorStop(0,"#b9c7cc"); g.addColorStop(0.42,"#9fb3a0"); g.addColorStop(0.55,"#5f8a4e"); g.addColorStop(1,"#33591f");
    x.fillStyle=g; x.fillRect(0,0,1280,854);
    for (let i=0;i<9000;i++){ const px=Math.random()*1280, py=380+Math.random()*474, h=6+Math.random()*22, s=60+Math.random()*90; x.strokeStyle=`rgba(${s*0.5|0},${s|0},${s*0.45|0},${0.15+Math.random()*0.28})`; x.lineWidth=1+Math.random(); x.beginPath(); x.moveTo(px,py); x.lineTo(px+(Math.random()-0.5)*8,py-h); x.stroke(); }
    return c;
  }
  upload(placeholder(), 1280/854);

  const U = {
    sim: ["u_prev","u_mouse","u_mousePrev","u_aspect","u_radius","u_strength","u_decay","u_active","u_blow","u_blowPos","u_blowRadius"].reduce((m,k)=>(m[k]=gl.getUniformLocation(progSim,k),m),{}),
    bg:  ["u_image","u_scrAspect","u_imgAspect","u_night","u_glow","u_fire"].reduce((m,k)=>(m[k]=gl.getUniformLocation(progBg,k),m),{}),
    bl:  ["u_res","u_time","u_wind","u_push","u_dpr","u_scrAspect","u_imgAspect","u_field","u_image","u_night","u_aspect","u_glow","u_fire"].reduce((m,k)=>(m[k]=gl.getUniformLocation(progBl,k),m),{}),
  };

  const params = { wind:1, reach:0.14, force:1.2, recovery:0.90 };
  const mouse = { x:0.5, y:0.5, px:0.5, py:0.5, active:0 };
  let dpr = 1;

  // day/night
  let nightTarget = 0, nightAmount = 0, firePulse = 0.8;
  const dnBtn = document.getElementById("dn");
  function toggleNight(){ nightTarget = nightTarget ? 0 : 1; document.body.classList.toggle("night", !!nightTarget); }
  dnBtn.addEventListener("click", () => { toggleNight(); dnBtn.blur(); });
  addEventListener("keydown", e => { if (e.key === "n" || e.key === "N") toggleNight(); });

  /* ---------------- PARK AUDIO (live synth: birds + warm bed, no files) ---------------- */
  let actx=null, master=null, warmthGain=null, birdsDry=null, wetGain=null, conv=null,
      birdsBus=null, cricketsBus=null, audioReady=false, soundOn=true,
      nextCall=0, nextCricket=0, schedTimer=null;
  const sndBtn = document.getElementById("snd");

  function makeIR(){
    const sr = actx.sampleRate, len = Math.floor(0.6*sr);
    const ir = actx.createBuffer(2, len, sr);
    for (let ch=0; ch<2; ch++){ const d=ir.getChannelData(ch); let lp=0;
      for (let i=0;i<len;i++){ const w=(Math.random()*2-1)*Math.exp(-i/(len*0.33)); lp=0.6*lp+0.4*w; d[i]=lp; } }
    return ir;
  }

  function buildAudio(){
    const AC = window.AudioContext || window.webkitAudioContext; if (!AC) return false;
    actx = new AC();
    const sr = actx.sampleRate;
    master = actx.createGain(); master.gain.value = 0.0001; master.connect(actx.destination);
    // reverb send (pushes birds back into the trees)
    conv = actx.createConvolver(); conv.buffer = makeIR();
    wetGain = actx.createGain(); wetGain.gain.value = 0.28; conv.connect(wetGain); wetGain.connect(master);
    birdsDry = actx.createGain(); birdsDry.gain.value = 1.0; birdsDry.connect(master);
    // separate day (birds) and night (crickets) buses, crossfaded by nightAmount
    birdsBus = actx.createGain(); birdsBus.gain.value = 1.0;
    cricketsBus = actx.createGain(); cricketsBus.gain.value = 0.0001;
    birdsBus.connect(birdsDry); birdsBus.connect(conv);
    cricketsBus.connect(birdsDry); cricketsBus.connect(conv);
    // warm bed: very soft, dark brown noise
    const wlen = 2*sr, wbuf = actx.createBuffer(1, wlen, sr), wd = wbuf.getChannelData(0); let lb=0;
    for (let i=0;i<wlen;i++){ wd[i] = (lb = (lb + 0.016*(Math.random()*2-1))/1.016)*3.6; }
    const wsrc = actx.createBufferSource(); wsrc.buffer = wbuf; wsrc.loop = true;
    const wlp = actx.createBiquadFilter(); wlp.type="lowpass"; wlp.frequency.value=320; wlp.Q.value=0.3;
    warmthGain = actx.createGain(); warmthGain.gain.value = 0.05;
    wsrc.connect(wlp); wlp.connect(warmthGain); warmthGain.connect(master); wsrc.start();
    nextCall = actx.currentTime + 0.6;
    nextCricket = actx.currentTime + 0.6;
    if (!schedTimer) schedTimer = setInterval(scheduler, 120);
    audioReady = true; return true;
  }

  // one whistle note with a pitch glide + soft envelope (+ optional 2nd harmonic)
  function birdNote(t, f0, f1, dur, peak, dest, harm2){
    const mk = (mult, amp) => {
      const o = actx.createOscillator(); o.type = "sine";
      o.frequency.setValueAtTime(f0*mult, t); o.frequency.linearRampToValueAtTime(f1*mult, t+dur);
      const g = actx.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(amp, t + Math.min(0.02, dur*0.3));
      g.gain.exponentialRampToValueAtTime(0.0006, t + dur);
      o.connect(g); g.connect(dest); o.start(t); o.stop(t + dur + 0.03);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    };
    mk(1, peak);
    if (harm2 > 0) mk(2, peak*harm2);
  }

  // a randomized songbird phrase: list of [f0, f1, dur, gapAfter, harm2]
  function makeVoice(){
    const k = 1.0 + (Math.random()-0.5)*0.16, p = Math.random();
    if (p < 0.25) return [[2100*k,2500*k,0.07,0.03,0.30],[2500*k,3200*k,0.06,0,0.25]];
    if (p < 0.45) return [[1700*k,1500*k,0.05,0.02,0.20],[2000*k,3000*k,0.12,0,0.30]];
    if (p < 0.62){ const a=[]; let f=2600*k; const m=4+(Math.random()*4|0);
      for (let i=0;i<m;i++){ a.push([f,f*1.04,0.035,0.018,0.2]); f*=1+(Math.random()-0.5)*0.04; } return a; }
    if (p < 0.80) return [[3200*k,1900*k,0.16,0,0.25]];
    return [[950*k,880*k,0.28,0,0.50]]; // soft low coo
  }

  function playCall(t0){
    const voice = makeVoice();
    const pan = actx.createStereoPanner(); pan.pan.value = (Math.random()*2-1)*0.7;
    pan.connect(birdsBus);
    const peak = 0.10 + 0.12*Math.random();
    let t = t0;
    for (const [f0,f1,dur,gap,h2] of voice){ birdNote(t,f0,f1,dur,peak,pan,h2); t += dur + gap; }
    setTimeout(() => pan.disconnect(), Math.max(200, (t - actx.currentTime + 0.6)*1000));
  }

  // a cricket chirp: a short run of rapid tonal pulses (~4.5 kHz)
  function playCricket(t0){
    const base = 4200 + Math.random()*900;
    const pulses = 3 + (Math.random()*3|0);
    const pdur = 0.011 + Math.random()*0.006, gap = 0.010 + Math.random()*0.006;
    const peak = 0.045 + 0.04*Math.random();
    const pan = actx.createStereoPanner(); pan.pan.value = (Math.random()*2-1)*0.8;
    pan.connect(cricketsBus);
    let t = t0;
    for (let i=0;i<pulses;i++){
      const o = actx.createOscillator(); o.type="triangle"; o.frequency.value=base;
      const o2 = actx.createOscillator(); o2.type="sine"; o2.frequency.value=base*2;
      const g = actx.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(peak, t+0.003);
      g.gain.exponentialRampToValueAtTime(0.0006, t+pdur);
      o.connect(g); o2.connect(g); g.connect(pan);
      o.start(t); o.stop(t+pdur+0.006); o2.start(t); o2.stop(t+pdur+0.006);
      o.onended = () => { o.disconnect(); o2.disconnect(); g.disconnect(); };
      t += pdur + gap;
    }
    setTimeout(() => pan.disconnect(), Math.max(200, (t - actx.currentTime + 0.4)*1000));
  }

  // a soft bell: a few decaying partials
  function bellNote(t, f, dur, peak, dest){
    for (const [mult,amp,dec] of [[1,1.0,2.4],[2,0.5,3.0],[2.76,0.28,3.6],[3,0.16,4.0]]){
      const o = actx.createOscillator(); o.type="sine"; o.frequency.value = f*mult;
      const g = actx.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(peak*amp, t+0.005);
      g.gain.exponentialRampToValueAtTime(0.0004, t+dur*(dec>3?0.7:1.0));
      o.connect(g); g.connect(dest); o.start(t); o.stop(t+dur+0.05);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    }
  }
  let lastChime = 0;
  function chime(){
    if (!audioReady) return;
    const now = actx.currentTime;
    if (now - lastChime < 0.18) return; lastChime = now;
    const night = nightAmount > 0.5;
    const scale = night ? [261.63,293.66,329.63,392.00,440.00]   // lower, softer
                        : [523.25,587.33,659.25,783.99,880.0];   // bright, open
    const peak = night ? 0.06 : 0.075, dur = night ? 2.8 : 1.9, n = 2 + (Math.random()*2|0);
    const dest = actx.createGain(); dest.connect(birdsDry); dest.connect(conv);
    for (let i=0;i<n;i++) bellNote(now + i*0.05, scale[(Math.random()*scale.length)|0], dur, peak, dest);
    setTimeout(() => dest.disconnect(), (dur+0.6)*1000);
  }

  function scheduler(){
    if (!audioReady || actx.state !== "running") return;
    const ahead = actx.currentTime + 0.3;
    while (nextCall < ahead){
      if (nextCall < actx.currentTime) nextCall = actx.currentTime + 0.05;
      if (nightAmount < 0.85) playCall(nextCall);       // birds by day
      nextCall += 0.6 + Math.random()*1.2;
    }
    while (nextCricket < ahead){
      if (nextCricket < actx.currentTime) nextCricket = actx.currentTime + 0.05;
      if (nightAmount > 0.15) playCricket(nextCricket);  // crickets by night
      nextCricket += 0.14 + Math.random()*0.26;          // dense, for a chorus
    }
  }

  function ensureAudio(){
    if (!audioReady && !buildAudio()) return;
    if (actx.state === "suspended") actx.resume();
    master.gain.setTargetAtTime(soundOn ? 0.9 : 0.0001, actx.currentTime, 0.6);
  }
  const firstGesture = e => { if (sndBtn.contains(e.target)) return; ensureAudio(); };
  ["pointerdown","keydown","touchstart"].forEach(ev => addEventListener(ev, firstGesture, { passive:true }));

  function setSound(on){
    soundOn = on; document.body.classList.toggle("muted", !on);
    if (audioReady) master.gain.setTargetAtTime(on ? 0.9 : 0.0001, actx.currentTime, 0.5);
    else if (on) ensureAudio();
  }
  sndBtn.addEventListener("click", () => { setSound(!soundOn); sndBtn.blur(); });

  /* ---- breath via camera (opt-in; face tracking runs locally, nothing recorded) ---- */
  let camStream=null, faceLandmarker=null, camOn=false, camStrength=0, faceDirX=0, faceDirY=0, faceLoopId=0;
  const camVideo = document.getElementById("cam");
  const breathBtn = document.getElementById("breath");
  const toastEl = document.getElementById("toast"); let toastT=null;
  function showToast(msg){ toastEl.textContent=msg; toastEl.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>toastEl.classList.remove("show"), 5200); }

  async function enableCamera(){
    try{
      showToast("loading face tracking…");
      const vision = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14");
      const { FaceLandmarker, FilesetResolver } = vision;
      const resolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
      faceLandmarker = await FaceLandmarker.createFromOptions(resolver, {
        baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task" },
        runningMode: "VIDEO", numFaces: 1, outputFaceBlendshapes: true
      });
      camStream = await navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240, facingMode: "user" } });
      camVideo.srcObject = camStream; await camVideo.play();
      ensureAudio();
      camOn = true; document.body.classList.add("mic-on");
      showToast("lean to aim · purse your lips and blow to part the grass · runs locally, never recorded");
      faceLoop();
    }catch(err){
      showToast("camera unavailable — hold space to breathe instead");
      console.warn("[meadow] camera/face init failed:", err);
    }
  }
  function disableCamera(){
    cancelAnimationFrame(faceLoopId);
    if (camStream){ camStream.getTracks().forEach(t=>t.stop()); camStream=null; }
    faceLandmarker=null; camOn=false; camStrength=0; document.body.classList.remove("mic-on");
  }
  breathBtn.addEventListener("click", () => { camOn ? disableCamera() : enableCamera(); breathBtn.blur(); });

  function faceLoop(){
    if (!camOn || !faceLandmarker) return;
    let res=null;
    try { res = faceLandmarker.detectForVideo(camVideo, performance.now()); } catch(e){}
    if (res && res.faceLandmarks && res.faceLandmarks.length){
      const lm = res.faceLandmarks[0];
      const nose = lm[1] || lm[0];
      const ox = (0.5 - nose.x) * 2.4;   // mirrored: lean left -> aim left   (flip sign if reversed)
      const oy = (nose.y - 0.5) * 2.0;
      faceDirX += (Math.max(-1,Math.min(1,ox)) - faceDirX) * 0.25;
      faceDirY += (Math.max(-1,Math.min(1,oy)) - faceDirY) * 0.25;
      let blow = 0;
      if (res.faceBlendshapes && res.faceBlendshapes.length){
        for (const c of res.faceBlendshapes[0].categories){
          if (c.categoryName === "mouthFunnel" || c.categoryName === "mouthPucker") blow = Math.max(blow, c.score);
          else if (c.categoryName === "jawOpen") blow = Math.max(blow, c.score*0.55);
        }
      }
      const target = Math.min(1, Math.max(0, (blow - 0.25) / 0.55));   // threshold + scale
      camStrength += (target - camStrength) * 0.3;
    } else {
      camStrength += (0 - camStrength) * 0.2;
    }
    faceLoopId = requestAnimationFrame(faceLoop);
  }

  function updateAudio(dt){
    if (!audioReady || actx.state !== "running") return;
    const now = actx.currentTime;
    // birds belong to day, crickets to night — crossfade with the visual fade
    birdsBus.gain.setTargetAtTime(Math.max(0, 1 - nightAmount), now, 0.3);
    cricketsBus.gain.setTargetAtTime(Math.max(0, 0.85*nightAmount), now, 0.3);
    // the warm bed gently follows the wind slider
    warmthGain.gain.setTargetAtTime(0.015 + params.wind*0.04, now, 0.6);
  }

  /* ---------------- BUTTERFLY / FIREFLY ---------------- */
  const bugCanvas = document.getElementById("bug");
  const bx = bugCanvas.getContext("2d");
  const B = {
    x: innerWidth/2, y: innerHeight*0.45, lx: innerWidth/2, ly: innerHeight*0.45,
    vx:0, vy:0, heading:-Math.PI/2, flap:0, state:"flying", alive:false,
    rest:{x:0,y:0}, burst:0, seed: Math.random()*9, fx: innerWidth/2, fy: innerHeight*0.45
  };
  const tgt = { x: innerWidth/2, y: innerHeight*0.45 };
  let lastMove = performance.now();
  const trail = [];

  function liftoff(){ B.state="flying"; B.burst=0.30; B.y -= 6; B.vy -= 40; }

  function updateBug(dt){
    const now = performance.now();
    const idle = (now - lastMove)/1000;
    if (B.state === "flying"){
      const f = 1 - Math.exp(-5.0*dt);
      B.x += (tgt.x - B.x)*f; B.y += (tgt.y - B.y)*f;
    } else {
      const f = 1 - Math.exp(-6.0*dt);
      B.x += (B.rest.x - B.x)*f; B.y += (B.rest.y - B.y)*f;
    }
    B.vx = (B.x - B.lx)/Math.max(dt,1e-3);
    B.vy = (B.y - B.ly)/Math.max(dt,1e-3);
    B.lx = B.x; B.ly = B.y;
    const spd = Math.hypot(B.vx, B.vy);
    if (spd > 25){
      const h = Math.atan2(B.vy, B.vx);
      let dh = h - B.heading; while(dh>Math.PI)dh-=2*Math.PI; while(dh<-Math.PI)dh+=2*Math.PI;
      B.heading += dh * (1 - Math.exp(-8*dt));
    }
    if (B.state === "flying" && idle > 1.1 && Math.hypot(tgt.x-B.x, tgt.y-B.y) < 14){
      B.state = "resting"; B.rest.x = B.x; B.rest.y = B.y + 5;
    }
    const norm = Math.min(spd/600, 1);
    let fs = B.state === "resting" ? 3.0 : (9 + 17*norm);
    B.burst = Math.max(0, B.burst - dt); if (B.burst > 0) fs += 20;
    B.flap += fs*dt;
    const flutterAmp = B.state === "resting" ? 1.4 : 4.5;
    const fl = Math.sin(now/1000*7 + B.seed) * flutterAmp * (0.4 + 0.6*norm);
    const perpx = -Math.sin(B.heading), perpy = Math.cos(B.heading);
    B.fx = B.x + perpx*fl;
    B.fy = B.y + perpy*fl + (B.state === "resting" ? Math.sin(now/1000*1.6)*1.0 : 0);
    mouse.x = B.fx / innerWidth;
    mouse.y = 1 - B.fy / innerHeight;
    mouse.active = B.alive ? (B.state === "resting" ? 0.4 : 1.0) : 0;
  }

  function wing(open){
    const g = bx.createLinearGradient(-7, 0, 9, -13*open);
    g.addColorStop(0, "#cf6a26"); g.addColorStop(0.55, "#f0a347"); g.addColorStop(1, "#f8cd78");
    bx.fillStyle = g;
    bx.strokeStyle = "rgba(60,34,16,0.85)"; bx.lineWidth = 1.1;
    bx.beginPath(); bx.ellipse(4.2, -10.5*open, 9.0, 11.5*open, -0.30, 0, Math.PI*2); bx.fill(); bx.stroke();
    bx.beginPath(); bx.ellipse(-5.0, -7.2*open, 7.6, 9.2*open, 0.22, 0, Math.PI*2); bx.fill(); bx.stroke();
    bx.save(); bx.globalAlpha *= 0.5; bx.strokeStyle = "rgba(50,28,12,0.9)"; bx.lineWidth = 2.2;
    bx.beginPath(); bx.ellipse(4.2, -10.5*open, 9.0, 11.5*open, -0.30, -0.6, 1.7); bx.stroke();
    bx.restore();
    bx.fillStyle = "rgba(255,246,225,0.9)";
    bx.beginPath(); bx.ellipse(8.0, -13.0*open, 1.5, 1.7*open, 0, 0, Math.PI*2); bx.fill();
    bx.beginPath(); bx.ellipse(5.2, -15.5*open, 1.1, 1.3*open, 0, 0, Math.PI*2); bx.fill();
  }

  function drawButterfly(open, alpha, scale){
    bx.save();
    bx.globalAlpha = 0.16 * alpha; bx.fillStyle = "#0a1206";
    bx.beginPath(); bx.ellipse(B.fx, B.fy + 8, 11*open + 5, 3.5, 0, 0, Math.PI*2); bx.fill();
    bx.restore();
    bx.save();
    bx.translate(B.fx, B.fy);
    bx.rotate(B.heading);
    bx.scale(scale, scale);
    bx.globalAlpha = 0.97 * alpha;
    bx.save(); wing(open); bx.restore();
    bx.save(); bx.scale(1, -1); wing(open); bx.restore();
    bx.globalAlpha = alpha;
    bx.fillStyle = "#26190f";
    bx.beginPath(); bx.ellipse(0, 0, 8.5, 2.2, 0, 0, Math.PI*2); bx.fill();
    bx.beginPath(); bx.arc(8.0, 0, 2.3, 0, Math.PI*2); bx.fill();
    bx.strokeStyle = "#26190f"; bx.lineWidth = 0.9; bx.lineCap = "round";
    bx.beginPath(); bx.moveTo(8.5,0); bx.quadraticCurveTo(13,-2, 14.5,-4.5); bx.stroke();
    bx.beginPath(); bx.moveTo(8.5,0); bx.quadraticCurveTo(13, 2, 14.5, 4.5); bx.stroke();
    bx.fillStyle = "#26190f";
    bx.beginPath(); bx.arc(14.7,-4.7,1.0,0,Math.PI*2); bx.fill();
    bx.beginPath(); bx.arc(14.7, 4.7,1.0,0,Math.PI*2); bx.fill();
    bx.restore();
  }

  function drawFirefly(alpha, pulse){
    bx.save();
    bx.globalCompositeOperation = "lighter";
    for (let i=0;i<trail.length;i++){
      const tp = trail[i], a = i/trail.length, rr = 5 + 11*a;
      const g = bx.createRadialGradient(tp.x, tp.y, 0, tp.x, tp.y, rr);
      g.addColorStop(0, `rgba(255,206,112,${0.12*a*alpha})`); g.addColorStop(1, "rgba(255,206,112,0)");
      bx.fillStyle = g; bx.beginPath(); bx.arc(tp.x, tp.y, rr, 0, Math.PI*2); bx.fill();
    }
    const R = 51.84 + 12.96*pulse;
    const g1 = bx.createRadialGradient(B.fx, B.fy, 0, B.fx, B.fy, R);
    g1.addColorStop(0, `rgba(255,208,112,${0.55*alpha*pulse})`);
    g1.addColorStop(0.4, `rgba(255,170,72,${0.18*alpha*pulse})`);
    g1.addColorStop(1, "rgba(255,150,50,0)");
    bx.fillStyle = g1; bx.beginPath(); bx.arc(B.fx, B.fy, R, 0, Math.PI*2); bx.fill();
    const g2 = bx.createRadialGradient(B.fx, B.fy, 0, B.fx, B.fy, 7);
    g2.addColorStop(0, `rgba(255,250,228,${0.95*alpha})`); g2.addColorStop(1, "rgba(255,232,160,0)");
    bx.fillStyle = g2; bx.beginPath(); bx.arc(B.fx, B.fy, 7, 0, Math.PI*2); bx.fill();
    bx.restore();
  }

  /* ---- watchful ambient insects: ladybugs & caterpillars by day, crickets by night ---- */
  const insects = [];
  for (let i=0;i<9;i++){
    const hx = innerWidth*(0.1+0.8*Math.random()), hy = innerHeight*(0.56+0.34*Math.random());
    insects.push({ x:hx,y:hy,hx,hy,type:(i<3?"ladybug":"moth"), mode:"idle",
                   flap:Math.random()*6,phase:Math.random()*6.28,
                   blink:Math.random()*6.28, blinkRate:1.0+Math.random()*0.9, facing:-Math.PI/2,
                   followT:0, coolT:Math.random()*2.5, vx:0, vy:0, px:hx, py:hy, wDir:Math.random()*6.28, wanderT:Math.random()*2,
                   orbAng:Math.random()*6.28, orbR:26+Math.random()*34, orbSpeed:(Math.random()<0.5?-1:1)*(0.6+Math.random()*0.8) });
  }
  const NOTICE_R = 175, ATTRACT_R = 105;
  function updateInsects(dt, cx, cy, alive){
    const tnow = performance.now()/1000;
    for (const ins of insects){
      const dx = cx-ins.x, dy = cy-ins.y, dist = alive ? Math.hypot(dx,dy) : 1e9;
      ins.coolT = Math.max(0, ins.coolT - dt);
      if (ins.mode === "idle"){
        if (dist < NOTICE_R) ins.facing = Math.atan2(dy,dx);          // curious: turn toward you
        if (alive && dist < ATTRACT_R && ins.coolT <= 0){             // tempted: tag along for a bit
          ins.mode = "follow"; ins.followT = 2.5 + Math.random()*2.8;
          ins.px = ins.x; ins.py = ins.y;
        } else {
          // gentle self-directed wander: steer velocity slowly, no fixed destination to snap to
          ins.wanderT -= dt;
          if (ins.wanderT <= 0){ ins.wDir = Math.random()*6.28; ins.wanderT = 1.5 + Math.random()*2.5; }
          const wsp = 9;  // px/s drift speed
          ins.vx += (Math.cos(ins.wDir)*wsp - ins.vx) * Math.min(1, dt*0.8);
          ins.vy += (Math.sin(ins.wDir)*wsp*0.5 + Math.sin(tnow*1.1+ins.phase)*4 - ins.vy) * Math.min(1, dt*0.8);
          ins.x += ins.vx*dt; ins.y += ins.vy*dt;
          // stay loosely within the field band by nudging velocity (never teleporting)
          if (ins.x < innerWidth*0.04)  ins.vx += 30*dt;
          if (ins.x > innerWidth*0.96)  ins.vx -= 30*dt;
          if (ins.y < innerHeight*0.54) ins.vy += 30*dt;
          if (ins.y > innerHeight*0.94) ins.vy -= 30*dt;
          if (Math.hypot(ins.vx,ins.vy) > 6) ins.facing = Math.atan2(ins.vy, ins.vx);
        }
      } else {                                                        // follow: orbit the creature, then peel off
        ins.followT -= dt;
        ins.orbAng += dt*ins.orbSpeed;
        const tx = cx + Math.cos(ins.orbAng)*ins.orbR;
        const ty = cy + Math.sin(ins.orbAng)*ins.orbR - 8;
        ins.px = ins.x; ins.py = ins.y;
        ins.x += (tx - ins.x)*Math.min(1,dt*0.875);
        ins.y += (ty - ins.y)*Math.min(1,dt*0.875);
        ins.facing = Math.atan2(cy-ins.y, cx-ins.x);
        if (ins.followT <= 0 || !alive){                              // simply stop following — keep coasting on current momentum
          ins.mode = "idle"; ins.coolT = 3 + Math.random()*3;
          ins.vx = (ins.x - ins.px)/Math.max(dt,1e-3);
          ins.vy = (ins.y - ins.py)/Math.max(dt,1e-3);
          ins.wDir = Math.atan2(ins.vy, ins.vx) || Math.random()*6.28;
          ins.wanderT = 1.0 + Math.random()*2.0;
        }
      }
      ins.flap  += dt*(ins.mode==="follow" ? 12 : (dist<NOTICE_R ? 5 : 7));
      ins.blink += dt*ins.blinkRate*(dist<NOTICE_R ? 1.7 : 1.0);
    }
  }

  function drawLadybug(ins, a){
    bx.save(); bx.translate(ins.x,ins.y); bx.rotate(ins.facing); bx.globalAlpha = a;
    bx.strokeStyle = "rgba(20,15,12,0.8)"; bx.lineWidth = 0.8; bx.lineCap = "round";
    for (const s of [-1,1]) for (const lx of [-3,-0.5,2]){ bx.beginPath(); bx.moveTo(lx,0.6*s); bx.lineTo(lx-1.5, (3.6)*s); bx.stroke(); }
    bx.fillStyle = "#c4291d";
    bx.beginPath(); bx.ellipse(-0.5,0,5.6,4.6,0,0,6.28); bx.fill();
    bx.fillStyle = "#16100c";
    bx.beginPath(); bx.ellipse(4.4,0,2.1,2.5,0,0,6.28); bx.fill();
    bx.strokeStyle = "rgba(15,8,6,0.85)"; bx.lineWidth = 0.8;
    bx.beginPath(); bx.moveTo(-5.9,0); bx.lineTo(3.4,0); bx.stroke();
    bx.fillStyle = "rgba(15,8,6,0.95)";
    for (const [sx,sy] of [[-3,-2],[-3,2],[0.6,-2.5],[0.6,2.5],[-4.6,0]]){ bx.beginPath(); bx.arc(sx,sy,0.95,0,6.28); bx.fill(); }
    bx.restore();
  }
  function drawMoth(ins, a){
    const open = 0.3 + 0.7*(0.5+0.5*Math.cos(ins.flap));
    bx.save(); bx.translate(ins.x,ins.y); bx.rotate(ins.facing + Math.PI/2); bx.globalAlpha = a;
    bx.fillStyle = "rgba(240,236,220,0.92)";
    bx.beginPath(); bx.ellipse(-3*open,0,3.2*open,5.5,0,0,6.28); bx.fill();
    bx.beginPath(); bx.ellipse( 3*open,0,3.2*open,5.5,0,0,6.28); bx.fill();
    bx.fillStyle = "rgba(70,60,45,0.9)";
    bx.beginPath(); bx.ellipse(0,0,1.1,4.4,0,0,6.28); bx.fill();
    bx.restore();
  }
  function drawInsects(night){
    for (const ins of insects){
      if (night < 0.985){ const a=(1-night)*0.9; ins.type==="ladybug" ? drawLadybug(ins,a) : drawMoth(ins,a); }
      if (night > 0.015){                        // night: blinking green firefly
        const blink = Math.pow(0.5+0.5*Math.sin(ins.blink), 6);  // mostly dim, brief flashes
        const a = night*(0.12 + 0.88*blink), R = 9 + 8*blink;
        bx.save(); bx.globalCompositeOperation = "lighter";
        const g = bx.createRadialGradient(ins.x,ins.y,0,ins.x,ins.y,R);
        g.addColorStop(0, `rgba(190,255,150,${0.5*a})`); g.addColorStop(1, "rgba(150,230,90,0)");
        bx.fillStyle = g; bx.beginPath(); bx.arc(ins.x,ins.y,R,0,6.28); bx.fill();
        const g2 = bx.createRadialGradient(ins.x,ins.y,0,ins.x,ins.y,2.4);
        g2.addColorStop(0, `rgba(228,255,205,${0.9*a})`); g2.addColorStop(1, "rgba(200,255,160,0)");
        bx.fillStyle = g2; bx.beginPath(); bx.arc(ins.x,ins.y,2.4,0,6.28); bx.fill();
        bx.restore();
      }
    }
  }

  function drawCreature(){
    bx.clearRect(0,0,innerWidth,innerHeight);
    drawInsects(nightAmount);
    if (!B.alive) return;
    const open = 0.16 + 0.84*(0.5 + 0.5*Math.cos(B.flap));
    const n = nightAmount;
    if (n < 0.985) drawButterfly(open, 1 - n, 1 - 0.5*n);
    if (n > 0.015){
      // maintain a short light-trail at night
      if (trail.length === 0 || Math.hypot(B.fx-trail[trail.length-1].x, B.fy-trail[trail.length-1].y) > 4){
        trail.push({x:B.fx, y:B.fy}); if (trail.length > 16) trail.shift();
      }
      drawFirefly(n, firePulse);
    } else if (trail.length) trail.length = 0;
  }

  function resize(){
    dpr = Math.min(window.devicePixelRatio||1, 2);
    const w = Math.round(innerWidth*dpr), h = Math.round(innerHeight*dpr);
    bugCanvas.width = w; bugCanvas.height = h;
    bugCanvas.style.width = innerWidth+"px"; bugCanvas.style.height = innerHeight+"px";
    bx.setTransform(dpr,0,0,dpr,0,0);
    if (canvas.width===w && canvas.height===h && fieldW===w) return;
    canvas.width=w; canvas.height=h; canvas.style.width=innerWidth+"px"; canvas.style.height=innerHeight+"px";
    makeTargets(w,h);
  }
  addEventListener("resize", resize); resize();
  setTimeout(() => document.body.classList.add("started"), 9000);

  addEventListener("pointermove", e => {
    const moved = Math.hypot(e.clientX - tgt.x, e.clientY - tgt.y);
    tgt.x = e.clientX; tgt.y = e.clientY; lastMove = performance.now();
    if (!B.alive) B.alive = true;
    if (B.state === "resting" && moved > 5) liftoff();
  }, { passive:true });

  // breath — hold space (or click-and-hold) to bow the grass and ring a chime
  let blowing = false, blowStrength = 0, breathArmed = false;
  function startBlow(){ ensureAudio(); blowing = true; }
  function stopBlow(){ blowing = false; }
  canvas.addEventListener("pointerdown", startBlow);
  addEventListener("pointerup", stopBlow);
  addEventListener("pointercancel", stopBlow);
  addEventListener("blur", stopBlow);
  addEventListener("keydown", e => { if (e.code === "Space"){ const a=document.activeElement; if (a && (a.tagName==="INPUT"||a.tagName==="BUTTON")) return; e.preventDefault(); startBlow(); } });
  addEventListener("keyup", e => { if (e.code === "Space") stopBlow(); });

  const wire = id => { const el=document.getElementById(id), out=document.getElementById(id+"_v"); const s=()=>{ params[id]=parseFloat(el.value); out.textContent=(+el.value).toFixed(2); }; el.addEventListener("input",s); s(); };
  ["wind","reach","force","recovery"].forEach(wire);

  const loadFile = f => { if(!f||!f.type.startsWith("image/")) return; const img=new Image(); img.onload=()=>{ upload(img, img.naturalWidth/img.naturalHeight); document.body.classList.add("has-photo"); URL.revokeObjectURL(img.src); }; img.src=URL.createObjectURL(f); };
  ["dragenter","dragover"].forEach(ev=>addEventListener(ev,e=>{e.preventDefault();document.body.classList.add("dragging");}));
  ["dragleave","drop"].forEach(ev=>addEventListener(ev,e=>{e.preventDefault();document.body.classList.remove("dragging");}));
  addEventListener("drop", e=>{ if(e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
  addEventListener("paste", e=>{ const it=[...(e.clipboardData?.items||[])].find(i=>i.type.startsWith("image/")); if(it) loadFile(it.getAsFile()); });

  let src={fbo:fboA,tex:texA}, dst={fbo:fboB,tex:texB};
  const t0 = performance.now(); let lastMs = t0; let checked=false;

  function frame(){
    const nowMs = performance.now();
    let dt = (nowMs - lastMs)/1000; lastMs = nowMs; dt = Math.min(dt, 0.05);
    const time = (nowMs - t0)/1000, aspect = canvas.width/canvas.height;

    nightAmount += (nightTarget - nightAmount) * (1 - Math.exp(-3.0*dt)); // ~0.33s feel, slow fade
    firePulse = 0.72 + 0.22*Math.sin(time*2.1) + 0.06*Math.sin(time*11.0);

    updateBug(dt);
    updateAudio(dt);

    if (blowing) blowStrength = Math.min(1, blowStrength + dt*2.5);
    else blowStrength = Math.max(0, blowStrength - dt*2.0);
    const breath = Math.max(blowStrength, camStrength);
    if (breath > 0.22 && !breathArmed){ chime(); breathArmed = true; }  // chime as the breath lands
    if (breath < 0.08) breathArmed = false;
    const blowVal = 0.19125 * breath * (0.9 + 0.1*Math.sin(time*6));
    // where the parting opens: aimed by the face when the camera is on, else around the butterfly
    let bpx = mouse.x, bpy = mouse.y;
    if (camOn){ bpx = 0.5 + faceDirX*0.42; bpy = Math.max(0.05, Math.min(0.5, 0.30 + faceDirY*0.15)); }
    updateInsects(dt, B.fx, B.fy, B.alive, breath, bpx*innerWidth, (1-bpy)*innerHeight);

    gl.bindFramebuffer(gl.FRAMEBUFFER, dst.fbo); gl.viewport(0,0,fieldW,fieldH);
    gl.disable(gl.BLEND);
    gl.useProgram(progSim); gl.bindVertexArray(vaoQuad);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, src.tex); gl.uniform1i(U.sim.u_prev,0);
    gl.uniform2f(U.sim.u_mouse,mouse.x,mouse.y); gl.uniform2f(U.sim.u_mousePrev,mouse.px,mouse.py);
    gl.uniform1f(U.sim.u_aspect,aspect); gl.uniform1f(U.sim.u_radius,params.reach);
    gl.uniform1f(U.sim.u_strength,params.force); gl.uniform1f(U.sim.u_decay,params.recovery);
    gl.uniform1f(U.sim.u_active,mouse.active);
    gl.uniform1f(U.sim.u_blow, blowVal); gl.uniform2f(U.sim.u_blowPos, bpx, bpy); gl.uniform1f(U.sim.u_blowRadius, 0.22);
    gl.drawArrays(gl.TRIANGLES,0,3);
    mouse.px=mouse.x; mouse.py=mouse.y; [src,dst]=[dst,src];

    gl.bindFramebuffer(gl.FRAMEBUFFER,null); gl.viewport(0,0,canvas.width,canvas.height);
    gl.useProgram(progBg); gl.bindVertexArray(vaoQuad);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,imageTex); gl.uniform1i(U.bg.u_image,0);
    gl.uniform1f(U.bg.u_scrAspect,aspect); gl.uniform1f(U.bg.u_imgAspect,imgAspect);
    gl.uniform1f(U.bg.u_night,nightAmount); gl.uniform1f(U.bg.u_glow,firePulse);
    gl.uniform2f(U.bg.u_fire,mouse.x,mouse.y);
    gl.drawArrays(gl.TRIANGLES,0,3);

    gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA); gl.disable(gl.DEPTH_TEST);
    gl.useProgram(progBl); gl.bindVertexArray(vaoBl);
    gl.uniform2f(U.bl.u_res,canvas.width,canvas.height); gl.uniform1f(U.bl.u_time,time);
    gl.uniform1f(U.bl.u_wind,params.wind); gl.uniform1f(U.bl.u_push,95.0); gl.uniform1f(U.bl.u_dpr,dpr);
    gl.uniform1f(U.bl.u_scrAspect,aspect); gl.uniform1f(U.bl.u_imgAspect,imgAspect);
    gl.uniform1f(U.bl.u_night,nightAmount); gl.uniform1f(U.bl.u_aspect,aspect); gl.uniform1f(U.bl.u_glow,firePulse);
    gl.uniform2f(U.bl.u_fire,mouse.x,mouse.y);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,src.tex); gl.uniform1i(U.bl.u_field,0);
    gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D,imageTex); gl.uniform1i(U.bl.u_image,1);
    gl.drawArraysInstanced(gl.TRIANGLE_STRIP,0,VERTS,N);
    gl.bindVertexArray(null);

    drawCreature();

    if(!checked){ checked=true; const e=gl.getError(); if(e!==gl.NO_ERROR) console.warn("[meadow] WebGL error:",e); else console.log("[meadow] running — press N for night"); }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
